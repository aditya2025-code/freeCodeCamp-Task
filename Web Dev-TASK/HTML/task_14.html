<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>

<body>
    <h1 id="title">ADI's Survey Form</h1>
    <p id="description">Hello friends, this is Adi and I want that everyone should fill this survey form</p>
    <form id="survey-form">
        <fieldset>
            <legend>Contact Informaton</legend>
            <label for="name" id="name-label">Full Name * :
                <input type="text" id="name" required placeholder="Adi Bhai">
            </label><br><br>
            <label for="email" id="email-label">Email * :
                <input type="email" id="email" required placeholder="adi@ceo.in">
            </label><br><br>
            <label for="number" id="number-label">Age :
                <input type="number" id="number" min="17" max="23" placeholder="17-23">
            </label><br>
        </fieldset><br>
        <fieldset>
            <legend>What About Adi</legend>
            <label for="good">What do you think Aditya is
                <select name="good" id="dropdown">
                    <option value="Handsome">Handsome</option>
                    <option value="loveguru">LoveGuru</option>
                    <option value="Imortal">Imortal</option>
                </select>
            </label><br><br>
            Adi wants more
            <input type="radio" name="want" value="money" id="want">
            <label for="want">Money</label>
            <input type="radio" name="want" value="love" id="want2">
            <label for="want2">Love</label><br><br>
            What you like about adi
            <input type="checkbox" id="coding" name="hobby" value="coding" checked>
            <label for="coding">Coding</label>
            <input type="checkbox" id="music" name="hobby" value="music">
            <label for="music">Teaching</label>
            <input type="checkbox" id="gaming" name="hobby" value="gaming">
            <label for="gaming">Gaming</label>
        </fieldset>
        <label for="comment">
            <p>Your Valueable Feedback for this Form</p>
            <textarea name="comment" id="comment" cols="40" rows="8"
                placeholder="write your best feedback ever..."></textarea>
        </label><br>
        <button type="submit" id="submit">Confirm Here</button>
        <button type="reset" id="reset">Reset Here</button>
    </form>
</body>

</html>
